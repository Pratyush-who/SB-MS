spring.application.name=ecom-application
spring.config.import=optional:file:.env[.properties]
#spring.h2.console.enabled=true
#spring.datasource.url=jdbc:h2:mem:ecomdb
#spring.jpa.show-sql=true
#spring.jpa.hibernate.ddl-auto=create

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:ecomdbms}?TimeZone=${DB_TIMEZONE:Asia/Kolkata}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.jpa.database=POSTGRESQL
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
info.app.name=Ecom Application
info.app.version=1.0.0
info.app.description=An e-commerce application built with Spring Boot
management.info.env.enabled=true
management.endpoint.shutdown.enabled=true
server.shutdown=graceful
